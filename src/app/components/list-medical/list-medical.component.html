<ion-grid>
  <ion-row>
    @for (item of evolutions; track item.id) {

      <ion-col size="12" size-md="6">

        <ion-card>

          <ion-card-header>
            <ion-card-title class="ion-text-center">
              {{ item.namePatient }}
            </ion-card-title>
            <ion-card-subtitle class="ion-text-center">
              {{ item.date }}
            </ion-card-subtitle>
          </ion-card-header>

          <ion-card-content>

            <div class="card-content">

              <div class="info">
                <p>Observaciones: {{ item.evolution }}</p>
                <p>Profesional: {{ item.nameProfessional }}</p>
              </div>

              <div class="actions">
                <ion-button
                  color="danger"
                  (click)="delete(item.id!)">
                  Eliminar
                </ion-button>

                <ion-button
                  color="warning"
                  (click)="update(item.id!)">
                  Editar
                </ion-button>
              </div>

            </div>

          </ion-card-content>

        </ion-card>

      </ion-col>

    }
  </ion-row>
</ion-grid>
