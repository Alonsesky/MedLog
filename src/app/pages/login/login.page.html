<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <form [formGroup]="formLogin">

    <ion-item>
      <ion-input
        label="email"
        type="email"
        name="email"
        formControlName="email"
      />
    </ion-item>

    <ion-item>
      <ion-input
        label="password"
        type="password"
        name="password"
        formControlName="password"
      />
    </ion-item>

    <ion-item>
      <ion-button (click)="login()">
        Login
      </ion-button>
    </ion-item>
    <ion-item>
      <ion-button (click)="logout()">
        Cerrar sesión
      </ion-button>
    </ion-item>
  </form>
</ion-content>
