<ion-header>
  <ion-toolbar class="toolbar-centered">
    <ion-title>Portal Paciente</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logOut()">
        <ion-icon name="log-out-outline" size="large"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card *ngFor="let evo of evolutions$ | async">
    <ion-card-header>
      <ion-grid fixed>
        <ion-row>
          <ion-col size="12">
            <ion-card-title>{{evo.nameProfessional}}</ion-card-title>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-card-content>
            <p class="obs">{{evo.evolution}}</p>
          </ion-card-content>
        </ion-row>
        <ion-row>
          <ion-col size="12" class="ion-text-center">
            <ion-card-subtitle>
              Fecha visita: {{evo.date | date: 'dd-MM-yyyy'}}
            </ion-card-subtitle>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-header>

  </ion-card>
</ion-content>
