<ion-fab class="medical-fab" slot="fixed" horizontal="end" vertical="bottom">
  <ion-fab-button color="secondary" aria-label="Crear">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>

  <ion-fab-list side="top">
    <ion-fab-button color="success" aria-label="Agregar">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button color="warning" aria-label="Editar">
      <ion-icon name="list-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab-list>
</ion-fab>
